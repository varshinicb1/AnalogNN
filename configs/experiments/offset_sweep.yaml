# Configuration for op-amp offset voltage sweeps
experiment_name: "offset_sweep"
seed: 42

dataset:
  name: "mnist"
  subset_size: 150
  downsample_size: 8

model:
  hidden_dims: [16, 8]
  epochs: 15
  lr: 0.01
  batch_size: 16

analog:
  enable_noise: false
  noise_sigma: 0.0
  enable_mismatch: false
  resistor_mismatch: 0.0
  enable_offset: true
  opamp_offset: 0.002
  enable_quantization: false
  quantization_bits: 0
  saturation_vmax: 5.0

sweep:
  parameter: "analog.opamp_offset"
  values: [0.0, 0.0005, 0.001, 0.002, 0.003, 0.005, 0.008, 0.01]
  runs_per_value: 5
