# Configuration for resistor mismatch sweeps
experiment_name: "mismatch_sweep"
seed: 42

dataset:
  name: "mnist"
  subset_size: 150
  downsample_size: 8

model:
  hidden_dims: [16, 8]
  epochs: 15
  lr: 0.01
  batch_size: 16

analog:
  enable_noise: false
  noise_sigma: 0.0
  enable_mismatch: true
  resistor_mismatch: 0.01
  enable_offset: false
  opamp_offset: 0.0
  enable_quantization: false
  quantization_bits: 0
  saturation_vmax: 5.0

sweep:
  parameter: "analog.resistor_mismatch"
  values: [0.0, 0.005, 0.01, 0.02, 0.03, 0.05, 0.08, 0.1]
  runs_per_value: 5
