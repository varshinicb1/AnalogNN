# Configuration for temporal noise sweeps
experiment_name: "noise_sweep"
seed: 42

dataset:
  name: "mnist"
  subset_size: 150
  downsample_size: 8

model:
  hidden_dims: [16, 8]
  epochs: 15
  lr: 0.01
  batch_size: 16

analog:
  enable_noise: true
  noise_sigma: 0.05
  enable_mismatch: false
  resistor_mismatch: 0.0
  enable_offset: false
  opamp_offset: 0.0
  enable_quantization: false
  quantization_bits: 0
  saturation_vmax: 5.0

sweep:
  parameter: "analog.noise_sigma"
  values: [0.0, 0.01, 0.02, 0.05, 0.08, 0.1, 0.15, 0.2, 0.25]
  runs_per_value: 5
