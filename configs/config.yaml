# OpenAnalogNN Configuration Schema
seed: 42

dataset:
  name: "iris"          # Options: "xor", "iris", "mnist", "fashion"
  subset_size: 150       # Number of samples for evaluation/simulation
  downsample_size: 8     # Downsample MNIST/Fashion images to (downsample_size x downsample_size)

model:
  hidden_dims: [16, 8]  # Configurable hidden layer sizes
  epochs: 20
  lr: 0.01
  batch_size: 16
  noise_aware_training: false  # Enables hardware-resilient training

analog:
  noise_sigma: 0.05      # Weight noise standard deviation
  quantization_bits: 6   # Weight and activation quantization resolution
  drift_tau: 1e5         # Drift time constant (seconds)
  drift_time: 1e3        # Elapsed time for drift simulation
  saturation_vmax: 2.5   # Maximum output voltage (supply rail limit)
  resistor_mismatch: 0.01 # Resistor tolerance standard deviation (e.g. 1%)
  opamp_offset: 0.002    # Op-amp input offset voltage (V)

circuit:
  r_ref: 10000.0         # Reference resistor (10 kOhms)
  v_ref: 1.0             # Reference voltage representing input scale 1.0
  backend: "numerical"   # Options: "ngspice", "numerical"
  save_netlists: true

calibration:
  method: "polynomial"   # Options: "affine", "polynomial", "learned"
  poly_degree: 3
  learned_epochs: 100
  learned_lr: 0.01
